<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" width="100%" height="100%" style="background-color: #0d1117; font-family: 'Inter', -apple-system, sans-serif;">
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>

    <!-- Gradients -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#79c0ff" />
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7b72" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title -->
  <text x="550" y="50" font-size="32" font-weight="900" text-anchor="middle" fill="#c9d1d9" letter-spacing="2">EXECUTION WORKFLOW SEQUENCE</text>
  <text x="550" y="80" font-size="16" font-weight="400" text-anchor="middle" fill="#8b949e">Step-by-Step Interaction Timeline</text>

  <!-- ==================== LIFELINES ==================== -->
  
  <!-- Lifeline lines -->
  <line x1="150" y1="180" x2="150" y2="850" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4" />
  <line x1="350" y1="180" x2="350" y2="850" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4" />
  <line x1="550" y1="180" x2="550" y2="850" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4" />
  <line x1="750" y1="180" x2="750" y2="850" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4" />
  <line x1="950" y1="180" x2="950" y2="850" stroke="#30363d" stroke-width="2" stroke-dasharray="8,4" />

  <!-- Headers -->
  <rect x="70" y="130" width="160" height="50" rx="8" fill="#161b22" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="160" font-size="16" font-weight="bold" fill="#c9d1d9" text-anchor="middle">User / Admin</text>

  <rect x="270" y="130" width="160" height="50" rx="8" fill="url(#gradBlue)" filter="url(#shadow)"/>
  <text x="350" y="160" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Frontend (Client)</text>

  <rect x="470" y="130" width="160" height="50" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="160" font-size="16" font-weight="bold" fill="#79c0ff" text-anchor="middle">Backend (API)</text>

  <rect x="670" y="130" width="160" height="50" rx="8" fill="url(#gradRed)" filter="url(#shadow)"/>
  <text x="750" y="160" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">AI Agents</text>

  <rect x="870" y="130" width="160" height="50" rx="8" fill="url(#gradGreen)" filter="url(#shadow)"/>
  <text x="950" y="160" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">MySQL DB</text>

  <!-- ==================== SEQUENCE STEPS ==================== -->

  <!-- STEP 1: INITIALIZATION -->
  <circle cx="50" cy="220" r="15" fill="#f43f5e"/>
  <text x="50" y="225" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <line x1="150" y1="220" x2="550" y2="220" stroke="#79c0ff" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="350" y="210" font-size="14" font-weight="bold" fill="#79c0ff" text-anchor="middle">Initialization: npm run ingest</text>
  
  <line x1="550" y1="250" x2="950" y2="250" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGray)"/>
  <text x="750" y="240" font-size="12" fill="#8b949e" text-anchor="middle">Processes PDFs &amp; Populates Vector Database</text>

  <!-- STEP 2: USER INTERACTION -->
  <circle cx="50" cy="310" r="15" fill="#f43f5e"/>
  <text x="50" y="315" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <line x1="150" y1="310" x2="350" y2="310" stroke="#79c0ff" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="250" y="300" font-size="14" font-weight="bold" fill="#79c0ff" text-anchor="middle">User Interaction</text>
  <text x="250" y="330" font-size="12" font-style="italic" fill="#c9d1d9" text-anchor="middle">"My screen cracked, is it covered?"</text>

  <!-- STEP 3: ROUTING -->
  <circle cx="50" cy="380" r="15" fill="#f43f5e"/>
  <text x="50" y="385" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <line x1="350" y1="370" x2="550" y2="370" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="450" y="360" font-size="12" fill="#8b949e" text-anchor="middle">Sends message via tRPC</text>

  <line x1="550" y1="400" x2="750" y2="400" stroke="#ff7b72" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="650" y="390" font-size="14" font-weight="bold" fill="#ff7b72" text-anchor="middle">Routing (Intent Agent)</text>
  <line x1="750" y1="430" x2="550" y2="430" stroke="#ff7b72" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowOrange)"/>
  <text x="650" y="420" font-size="12" fill="#c9d1d9" text-anchor="middle">Classifies as: Policy_Inquiry</text>

  <!-- STEP 4: RETRIEVAL -->
  <circle cx="50" cy="500" r="15" fill="#f43f5e"/>
  <text x="50" y="505" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  <line x1="550" y1="480" x2="750" y2="480" stroke="#79c0ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="650" y="470" font-size="12" fill="#79c0ff" text-anchor="middle">Embedding Model (Gets Vector)</text>

  <line x1="550" y1="520" x2="950" y2="520" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGray)"/>
  <text x="750" y="510" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">Retrieval (MySQL Query)</text>

  <line x1="950" y1="560" x2="550" y2="560" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowGray)"/>
  <text x="750" y="550" font-size="12" fill="#c9d1d9" text-anchor="middle">Returns Warranty.pdf Chunk</text>
  <text x="750" y="580" font-size="11" font-style="italic" fill="#8b949e" text-anchor="middle">"Accidental damage... Premium Care tier"</text>

  <!-- STEP 5: SYNTHESIS -->
  <circle cx="50" cy="650" r="15" fill="#f43f5e"/>
  <text x="50" y="655" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
  <line x1="550" y1="640" x2="750" y2="640" stroke="#ff7b72" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="650" y="630" font-size="14" font-weight="bold" fill="#ff7b72" text-anchor="middle">Synthesis (Resolution Agent)</text>
  <text x="650" y="660" font-size="11" fill="#8b949e" text-anchor="middle">Takes chunk &amp; generates polite response</text>

  <line x1="750" y1="690" x2="550" y2="690" stroke="#ff7b72" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowOrange)"/>
  <text x="650" y="680" font-size="12" fill="#c9d1d9" text-anchor="middle">Final AI Response Ready</text>

  <!-- STEP 6: DELIVERY -->
  <circle cx="50" cy="760" r="15" fill="#f43f5e"/>
  <text x="50" y="765" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text>
  <line x1="550" y1="750" x2="350" y2="750" stroke="#79c0ff" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="450" y="740" font-size="14" font-weight="bold" fill="#79c0ff" text-anchor="middle">Delivery</text>

  <line x1="350" y1="780" x2="150" y2="780" stroke="#79c0ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="250" y="770" font-size="12" fill="#c9d1d9" text-anchor="middle">Frontend updates instantly</text>

</svg>
